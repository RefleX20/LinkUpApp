<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page not found — LinkUp</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/png" sizes="64x64" href="/favicon-64.png" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0a;
      color: #f2f2f2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    .code {
      font-size: clamp(5rem, 18vw, 9rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1;
      background: linear-gradient(135deg, #FFB300 0%, #D2413E 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 18px;
    }
    h1 { font-size: 1.3rem; font-weight: 700; margin-bottom: 10px; }
    p { color: rgba(255,255,255,0.55); font-size: 0.95rem; max-width: 380px; margin-bottom: 32px; line-height: 1.6; }
    a.home {
      display: inline-block;
      background: linear-gradient(135deg, #FFB300 0%, #D2413E 100%);
      color: #fff;
      padding: 13px 28px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 0.92rem;
      text-decoration: none;
      box-shadow: 0 6px 30px rgba(210,65,62,0.35);
    }
    a.home:focus-visible { outline: 2px solid #FFB300; outline-offset: 3px; }
  </style>
</head>

  <div class="code">404</div>
